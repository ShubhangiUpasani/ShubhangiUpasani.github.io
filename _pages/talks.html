---
layout: archive
title: "Invited Talks"
permalink: /talks/
author_profile: true
---

<ul>
{% for talk in site.talks reversed %}
  <li>
    [{{ talk.date | date: "%b %Y" }}] {{ talk.title }}
    {% if talk.links %}
      {% for link in talk.links %}<br><a href="{{ link.url }}" target="_blank" rel="noopener">{{ link.label }}</a>{% endfor %}
    {% endif %}
  </li>
{% endfor %}
</ul>
